name: Feature request
description: Suggest an improvement for a future release.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the dashboard or setup need.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, config, or visual change you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - Install or HACS
        - Visual layout
        - Sensor support
        - Actions
        - Documentation
        - Other
    validations:
      required: true
